<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AsliCheck</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <span class="logo-icon">&#10003;</span>
        <span class="logo-text">AsliCheck</span>
      </div>
      <span class="badge">Extension</span>
    </header>

    <div id="input-section">
      <p class="hint">Paste or type any claim, headline, or post to verify.</p>
      <textarea id="claim-input" rows="4" placeholder="e.g. Drinking hot water with lemon cures COVID-19"></textarea>
      <button id="verify-btn">
        <span id="btn-text">Verify Now</span>
        <span id="btn-loader" class="loader hidden"></span>
      </button>
      <p class="tip">💡 Tip: Select text on any page → right-click → <strong>Verify with AsliCheck</strong></p>
    </div>

    <div id="result-section" class="hidden">
      <button id="back-btn">&larr; New Check</button>

      <div id="result-header">
        <span id="status-badge"></span>
        <div id="confidence-wrap">
          <span class="conf-label">Confidence</span>
          <span id="confidence-value"></span>
        </div>
      </div>

      <div id="summary-box">
        <p id="summary-text"></p>
      </div>

      <div id="discrepancies-box" class="hidden">
        <h3>Key Issues</h3>
        <ul id="discrepancies-list"></ul>
      </div>

      <div id="sources-box" class="hidden">
        <h3>Sources</h3>
        <div id="sources-list"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
